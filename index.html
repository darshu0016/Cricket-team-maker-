<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="icon" type="image/png" href="logo.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0072ff">

<meta property="og:image" content="https://darshu0016.github.io/Cricket-team-maker-/logo.png">
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>Cricket Team Maker 🏏 | Random Team Generator & Toss Tool</title>

<meta name="description" content="Free Cricket Team Maker for street cricket. Instantly generate random cricket teams and perform a fair coin toss.">

<style>
body {
  font-family: "Poppins", sans-serif;
  text-align: center;
  background: linear-gradient(135deg,#00c6ff,#0072ff);
  color:#fff;
  margin:0;
  padding:20px;
}

input,button{
  padding:10px;
  border:none;
  border-radius:8px;
  margin:8px;
  font-size:16px;
}

button{
  background:#fff;
  color:#333;
  font-weight:bold;
  cursor:pointer;
}

.mainActions{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}

#generateBtn,#nameBtn,#singlesBtn{
  width:260px;
  height:48px;
  background:linear-gradient(135deg,#ff9800,#ff5722);
  color:#fff;
}

#resultBox{
  background:rgba(255,255,255,0.15);
  padding:15px;
  margin-top:20px;
  border-radius:10px;
}

/* 🔥 3D Coin */
#coin{
  width:100px;
  height:100px;
  margin:20px auto;
  perspective:1000px;
  display:none;
}

.coin-inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 2s;
}

.coin-front,.coin-back{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  font-weight:bold;
  backface-visibility:hidden;
}

.coin-front{
  background:gold;
}

.coin-back{
  background:silver;
  transform:rotateY(180deg);
}
</style>
</head>

<body>

<h2>🏏 Cricket Team Maker 🏏</h2>

<p>
Generate random cricket teams and perform toss for street matches.
</p>

<input type="number" id="numPlayers" value="6">

<button id="generateBtn" onclick="generateButtons()">Generate Players</button>

<div class="mainActions">
  <button id="nameBtn">Generate Using Names</button>
  <button id="singlesBtn">Singles</button>
</div>

<div id="playerButtons"></div>

<div id="resultBox" style="display:none;">

<button onclick="flipCoin()">Flip Coin</button>

<div id="coin">
  <div class="coin-inner">
    <div class="coin-front">H</div>
    <div class="coin-back">T</div>
  </div>
</div>

<div id="tossResult"></div>

</div>

<script>
let assignments={};

function generateButtons(){
  document.getElementById("resultBox").style.display="block";
}

function flipCoin(){

  const coin = document.getElementById("coin");
  const coinInner = document.querySelector(".coin-inner");
  const res = document.getElementById("tossResult");

  coin.style.display = "block";
  res.textContent = "";

  const result = Math.random() < 0.5 ? "Heads" : "Tails";

  if(result === "Heads"){
    coinInner.style.transform = "rotateY(1800deg)";
  } else {
    coinInner.style.transform = "rotateY(1980deg)";
  }

  setTimeout(()=>{
    res.innerHTML = "🪙 " + result;
  },2000);
}
</script>

</body>
</html>
